name: Manual Release
on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Target Version (e.g., 4.2.5)'
        required: true
        default: '4.1.50'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install Dependencies
        run: npm install glob

      - name: Execute Release Engine
        run: |
          node release-engine.js ${{ github.event.inputs.release_version }}

      - name: Commit and Tag
        run: |
          git config --global user.name "release-bot"
          git config --global user.email "bot@company.com"
          git add .
          git commit -m "chore: release ${{ github.event.inputs.release_version }} [skip ci]" || echo "No changes to commit"
          git tag v${{ github.event.inputs.release_version }}
          git push origin main --tags